<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div>
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>
      </header>

      <main class="page-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>© {{ site.time | date: '%Y' }} {{ site.title }}</p>
      </footer>
    </div>
  </body>
</html>
